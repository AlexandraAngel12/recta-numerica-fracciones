<html>
<head>
   <title>JSXGraph example</title>
      <link type="text/css" rel="stylesheet" href="css/jsxgraph.css">
      <script src="lib/jquery-2.2.3.min.js"></script>
      <script type="text/javascript" src="js/jsxgraphcore.js"></script>
 
</head>
<body>
  <h2>Slider example</h2>
  <div id="jxgbox" class="jxgbox" style="width:700px; height:500px;"></div>
  <div id="debug" style="display:none;"></div>
   <script type="text/javascript">
    /* <![CDATA[ */
        var p = 0.1;
        board = JXG.JSXGraph.initBoard('jxgbox', {boundingbox: [-0.2, 1.5, 2.2, -0.5], showNavigation: false, showCopyright: false});
        
  
        ax = board.create('line', [[0,0], [1,0]], {color:'black'});
        uno4 = board.create('point', [1, 0], {name: '1', //creamos el punto 1
            color: 'none',
            highlightStrokeColor: 'none',
            highlightFillColor: 'none'});
        uno4.setAttribute({fixed: true});
        uno4.label.setAttribute({fontSize: 20, offset: [-6, 30]});
        dos4 = board.create('point', [2, 0], {name: '2', //creamos el punto 2
            color: 'none',
            highlightStrokeColor: 'none',
            highlightFillColor: 'none'});
        dos4.setAttribute({fixed: true});
        dos4.label.setAttribute({fontSize: 20, offset: [-6, 30]});
        cero4 = board.create('point', [0, 0], {name: '0', //creamos el punto 0
            color: 'none',
            highlightStrokeColor: 'none',
            highlightFillColor: 'none'});
       cero4.setAttribute({fixed: true});
       cero4.label.setAttribute({fontSize: 20, offset: [-6, 30]});
        
        segmentos4 = board.create('ticks', [ax, 1], {strokeColor: 'black', minorTicks: 0, majorHeight: 15, minorHeight: 12, drawLabels: false});
        board.create('ticks', [ax, [0]], {strokeColor: 'black', majorHeight: 20});
    
    
       


   
   /* var ticks = board.create('ticks', [ax,1], {minorTicks: s.Value()-1, strokeColor:'orange'});*/
  
 
         
     
        var f = function(r) {
            board.create('ticks', [ax, 1], {strokeColor: 'orange', majorTicks: 0, minorTicks: r - 1, majorHeight: 30, minorHeight: 20, drawLabels: false});
            return r-1;
        };
          
    
                
        
        var s = board.create('slider', [[0.1,1],[1.6,1],[1,1,15]], {name:'S', snapWidth:1});
       board.create('text', [0.2,0.5,function(){ return 'cada unidad se divide en '+s.Value()+" segmentos"; }]);
        
    /*  board.create('ticks', [ax, 1], {strokeColor: 'blue', majorTicks: 0, minorTicks: f(s.Value()) , majorHeight: 30, minorHeight: 20, drawLabels: false});*/
      
       
        
       var point = board.create('point', [function(){return f(s.Value());},0], {strokecolor:'red'}); 

   



  </script>
</body>
</html>
